<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nivesh — Login</title>
<link rel="icon" type="image/png" href="assets/icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111916;
    --surface2: #182118;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --green: #3fffa2;
    --green-dim: rgba(63,255,162,0.10);
    --green-mid: rgba(63,255,162,0.25);
    --text: #f0f4f1;
    --muted: #7a9080;
    --muted2: #9ab0a0;
    --danger: #ff6b6b;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(63,255,162,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; margin-bottom: 2rem;
    justify-content: center;
  }
  .brand img { width: 36px; height: 36px; border-radius: 9px; object-fit: cover; }
  .brand-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.75rem;
  }
  .tab {
    flex: 1; padding: 8px; font-size: 14px; font-weight: 500;
    border: none; background: transparent; color: var(--muted);
    border-radius: 7px; cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-mid); }

  .form-group { margin-bottom: 1rem; }
  label { font-size: 12px; font-weight: 500; color: var(--muted2); display: block; margin-bottom: 6px; letter-spacing: 0.03em; }
  input {
    width: 100%; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--green-mid); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%; padding: 12px;
    background: var(--green); color: #0a0f0d;
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 13px; color: var(--danger);
    margin-bottom: 1rem; display: none;
  }
  .error.show { display: block; }

  .footer-link {
    text-align: center; margin-top: 1.25rem;
    font-size: 13px; color: var(--muted);
  }
  .footer-link a { color: var(--green); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <a href="index.html" class="brand">
    <img src="assets/icon.png" alt="Nivesh"/>
    <span class="brand-name">Nivesh</span>
  </a>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div id="error-msg" class="error"></div>

  <!-- Login Form -->
  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Login</button>
  </div>

  <!-- Register Form -->
  <div id="form-register" style="display:none;">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="reg-name" placeholder="Your name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')doRegister()"/>
    </div>
    <button class="btn" id="reg-btn" onclick="doRegister()">Create account</button>
  </div>

  <div class="footer-link">
    <a href="guide.html">📖 Read the First-Timer's Guide first</a>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

// If already logged in, go straight to app
if (localStorage.getItem('accessToken')) {
  window.location.href = 'app.html';
}

function switchTab(tab) {
  document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  showError('');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showError('Please fill in all fields.');

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in…';

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Login failed');
    localStorage.setItem('accessToken', data.accessToken || data.token);
    localStorage.setItem('user', JSON.stringify(data.user || {}));
    window.location.href = 'app.html';
  } catch (err) {
    showError(err.message);
    btn.disabled = false; btn.textContent = 'Login';
  }
}

async function doRegister() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showError('Please fill in all fields.');
  if (password.length < 6) return showError('Password must be at least 6 characters.');

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Registration failed');
    localStorage.setItem('accessToken', data.accessToken || data.token);
    localStorage.setItem('user', JSON.stringify(data.user || {}));
    window.location.href = 'app.html';
  } catch (err) {
    showError(err.message);
    btn.disabled = false; btn.textContent = 'Create account';
  }
}
</script>
</body>
</html>
